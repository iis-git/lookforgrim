name: Deploy to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" | sed 's/\r$//' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync backend to VPS
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes" \
            --exclude ".env" \
            --exclude ".env.production" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude "uploads" \
            ./backend/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/lookforgrim/backend/"

      - name: Sync frontend to VPS
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes" \
            --exclude ".env.local" \
            --exclude "node_modules" \
            --exclude ".next" \
            ./frontend/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/lookforgrim/frontend/"

      - name: Build and restart services on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
            set -euo pipefail

            cd /opt/lookforgrim/backend
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build db api

            cd /opt/lookforgrim/frontend
            cat > .env.local <<'ENVEOF'
            NEXT_PUBLIC_YANDEX_MAPS_API_KEY=ed792bc6-fd33-414a-91f2-58a64b6677dd
            ENVEOF
            npm ci
            npm run build

            systemctl restart lookforgrim-frontend
            systemctl reload nginx
          EOF

      - name: Health checks
        run: |
          curl --fail --silent --show-error --retry 20 --retry-delay 3 --retry-connrefused https://api.lookforgrim.online/v1/health > /dev/null
          curl --fail --silent --show-error --retry 20 --retry-delay 3 --retry-connrefused https://lookforgrim.online > /dev/null

      - name: Diagnostics on failure
        if: failure()
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
            set -euo pipefail

            echo "===== Docker compose status ====="
            cd /opt/lookforgrim/backend
            docker compose --env-file .env.production -f docker-compose.prod.yml ps || true

            echo "===== API logs (tail 200) ====="
            docker compose --env-file .env.production -f docker-compose.prod.yml logs --tail=200 api || true

            echo "===== Frontend service status ====="
            systemctl status lookforgrim-frontend --no-pager -l || true

            echo "===== Frontend journal (tail 200) ====="
            journalctl -u lookforgrim-frontend -n 200 --no-pager || true

            echo "===== Nginx status ====="
            systemctl status nginx --no-pager -l || true

            echo "===== Nginx error log (tail 200) ====="
            tail -n 200 /var/log/nginx/error.log || true
          EOF
